<!DOCTYPE html>
<html>
<head>
    <title>SIH Chatbot</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #1e1e2f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 400px;
            background: #2c2c3e;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            background: #1e1e2f;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .user {
            text-align: right;
            color: #00f5ff;
            margin: 5px;
        }
        .bot {
            text-align: left;
            color: #00ff95;
            margin: 5px;
        }
        input {
            width: 75%;
            padding: 8px;
            border-radius: 10px;
            border: none;
        }
        button {
            padding: 8px 15px;
            border-radius: 10px;
            border: none;
            background: #00ff95;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h2 style="color:white;">🤖 SIH ML Chatbot</h2>
    <div class="chat-box" id="chatbox"></div>
    <input type="text" id="text" placeholder="Ask about SIH...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage(){
    var userText = $("#text").val();
    $("#chatbox").append("<div class='user'>You: "+userText+"</div>");
    
    $.post("/get", {msg: userText}, function(data){
        $("#chatbox").append("<div class='bot' id='typing'>Bot is typing...</div>");
        setTimeout(function(){
            $("#typing").remove();
            $("#chatbox").append("<div class='bot'>Bot: "+data+"</div");
            $("#chatbox").scrollTop($("#chatbox")[0].scrollHeight);
        }, 1000);
    });
    
    $("#text").val("");
    $("#text").keypress(function(e) {
        if(e.which == 13) {
            sendMessage();
        }
    });
}
</script>
</body>
</html>
